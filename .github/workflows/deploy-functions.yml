name: Deploy Supabase Functions

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          npm i -g supabase

      - name: Run deploy script
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_API_SECRET: ${{ secrets.ADMIN_API_SECRET }}
          AFTERSHIP_API_KEY: ${{ secrets.AFTERSHIP_API_KEY }}
          SHIPENGINE_API_KEY: ${{ secrets.SHIPENGINE_API_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          BULK_JOB_PREFIX: ${{ secrets.BULK_JOB_PREFIX }}
        run: |
          chmod +x ./scripts/deploy-functions.sh
          # run script from repo root
          ./scripts/deploy-functions.sh
