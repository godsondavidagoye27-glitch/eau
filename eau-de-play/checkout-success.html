<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed - EAU DEY PLAY</title>
  
  <!-- CSS Links -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/public.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>
  <!-- Navbar Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Success Page -->
  <section class="cart-page">
    <div class="container">
      <div class="success-container">
        <div class="success-box">
          <div class="success-icon">✓</div>
          <h2>Order Confirmed!</h2>
          <p>Thank you for your purchase. Your order has been successfully placed.</p>
          
          <div class="order-number" id="order-id">
            Order #ORD-1234567890
          </div>

          <p id="status-message" style="font-size: var(--font-size-sm); color: var(--color-text-light);">
            A confirmation email has been sent to your email address.
            <br>
            You can track your order status in your email or contact us for updates.
          </p>

          <div style="display: flex; gap: var(--spacing-lg); margin-top: var(--spacing-xl);">
            <a href="index.html" class="btn" style="flex: 1; text-align: center;">BACK TO HOME</a>
            <a href="shop.html" class="btn btn-secondary" style="flex: 1; text-align: center; padding: var(--spacing-lg);">CONTINUE SHOPPING</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="js/public-app.js"></script>
  <script>
    async function updateOrderStatus(orderId, paymentStatus) {
      if (!orderId || paymentStatus === 'pending') return null;
      try {
        const response = await fetch('/api/orders/status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId, paymentStatus })
        });
        return response.ok ? response.json() : null;
      } catch (err) {
        console.warn('Unable to update order status', err);
        return null;
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('orderId');
      const paymentStatus = (urlParams.get('paymentStatus') || '').toLowerCase();
      const statusMessage = document.getElementById('status-message');
      const title = document.querySelector('.success-box h2');

      if (orderId) {
        document.getElementById('order-id').textContent = 'Order #' + orderId;
      }

      let displayState = 'pending';
      if (['paid', 'success', 'completed', 'confirmed', 'succeeded'].includes(paymentStatus)) {
        displayState = 'confirmed';
      } else if (['cancelled', 'canceled', 'cancel', 'failed', 'error'].includes(paymentStatus)) {
        displayState = 'cancelled';
      }

      if (orderId && displayState !== 'pending') {
        const result = await updateOrderStatus(orderId, displayState);
        if (result?.success) {
          const orderStatus = result.order?.status || displayState;
          if (title) {
            title.textContent = displayState === 'cancelled' ? 'Payment Cancelled' : 'Order Confirmed!';
          }
          if (statusMessage) {
            statusMessage.innerHTML = displayState === 'cancelled'
              ? 'The PayPal payment was cancelled, so the order remains pending.'
              : `Your order is now marked as ${orderStatus}.`;
            statusMessage.style.color = displayState === 'cancelled' ? '#e53935' : 'var(--color-text-light)';
          }
        }
      }
    });
  </script>
</body>
</html>
