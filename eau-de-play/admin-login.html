<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - EAU DEY PLAY</title>
  
  <!-- CSS Links -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">EAU DEY PLAY</div>
      <div class="login-title">Admin Login</div>
      
      <div class="login-error" id="login-error"></div>
      
      <form class="login-form" id="login-form">
        <div class="login-form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="admin@eaudeplay.com" required>
        </div>

        <div class="login-form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-button">LOGIN</button>
      </form>

      <div style="text-align: center; margin-top: var(--spacing-lg); font-size: var(--font-size-sm); color: var(--color-text-light);">
        <p><strong>Demo Credentials:</strong></p>
        <p>Email: admin@eaudeplay.com<br>Password: admin123</p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/admin-login.js"></script>
</body>
</html>
