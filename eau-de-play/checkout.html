<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - EAU DE PLAY</title>
  
  <!-- CSS Links -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/public.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>
  <!-- Navbar Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Checkout Page -->
  <section class="cart-page">
    <div class="checkout-container">
      <div class="checkout-header">
        <h1>Checkout</h1>
        <p>Complete your purchase</p>
      </div>

      <div class="checkout-content">
        <!-- Checkout Form -->
        <div class="checkout-section">
          <!-- Shipping Information -->
          <div class="form-section">
            <h3>Shipping Information</h3>
            
            <div class="checkout-form-group">
              <label for="firstName">First Name *</label>
              <input type="text" id="firstName" name="firstName" required>
            </div>

            <div class="checkout-form-group">
              <label for="lastName">Last Name *</label>
              <input type="text" id="lastName" name="lastName" required>
            </div>

            <div class="checkout-form-group">
              <label for="email">Email Address *</label>
              <input type="email" id="email" name="email" required>
            </div>

            <div class="checkout-form-group">
              <label for="phone">Phone Number *</label>
              <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="checkout-form-group">
              <label for="address">Street Address *</label>
              <input type="text" id="address" name="address" required>
            </div>

            <div class="form-row">
              <div class="checkout-form-group">
                <label for="city">City *</label>
                <input type="text" id="city" name="city" required>
              </div>

              <div class="checkout-form-group">
                <label for="state">State/Province *</label>
                <input type="text" id="state" name="state" required>
              </div>
            </div>

            <div class="form-row">
              <div class="checkout-form-group">
                <label for="zip">ZIP/Postal Code *</label>
                <input type="text" id="zip" name="zip" required>
              </div>

              <div class="checkout-form-group">
                <label for="country">Country *</label>
                <input type="text" id="country" name="country" value="United States">
              </div>
            </div>
          </div>

          <!-- Payment Information -->
          <div class="form-section">
            <h4>Payment Method</h4>
            <div class="payment-methods">
              <div class="payment-method">
                <input type="radio" id="payment-paypal" name="payment" value="paypal" checked>
                <label for="payment-paypal">🅿️ PayPal</label>
              </div>
            </div>

            <div id="paypal-payment">
              <p style="margin-top: 12px; color: #666;">You will be redirected to PayPal to complete your purchase securely.</p>
            </div>
          </div>
        </div>

        <!-- Order Summary -->
        <div class="checkout-section">
          <h3>Order Summary</h3>
          
          <div id="order-items">
            <!-- Order items dynamically populated -->
          </div>

          <div class="order-totals">
            <div class="total-row">
              <label>Subtotal</label>
              <span id="summary-subtotal">$0.00</span>
            </div>
            <div class="total-row">
              <label>Shipping</label>
              <span id="summary-shipping">$0.00</span>
            </div>
            <div class="total-row">
              <label>Tax (8%)</label>
              <span id="summary-tax">$0.00</span>
            </div>
            <div class="total-row grand-total">
              <label>Total</label>
              <span id="summary-total">$0.00</span>
            </div>
          </div>

          <div class="checkout-actions">
            <button class="btn btn-place-order" id="place-order-btn">PLACE ORDER</button>
            <button class="btn btn-secondary" id="cancel-order-btn" type="button" style="text-align: center; padding: var(--spacing-lg);">CANCEL</button>
            <a href="cart.html" class="btn btn-secondary" style="text-align: center; padding: var(--spacing-lg);">← BACK TO CART</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="js/cart.js"></script>
  <script type="module" src="js/public-app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cartManager = window.cartManager;
      const items = cartManager.getCartItems();

      if (items.length === 0) {
        window.location.href = 'cart.html';
        return;
      }

      const orderItemsContainer = document.getElementById('order-items');
      const orderItemsHTML = items.map(item => `
        <div class="order-summary-item">
          <div class="item-details">
            <h4>${item.name}</h4>
            <div class="item-quantity">Qty: ${item.quantity}</div>
          </div>
          <div class="item-total">$${(item.price * item.quantity).toFixed(2)}</div>
        </div>
      `).join('');
      orderItemsContainer.innerHTML = orderItemsHTML;

      const subtotal = cartManager.calculateTotal();
      const shipping = subtotal > 50 ? 0 : 10;
      const tax = subtotal * 0.08;
      const total = subtotal + shipping + tax;

      document.getElementById('summary-subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('summary-shipping').textContent = shipping === 0 ? 'FREE' : `$${shipping.toFixed(2)}`;
      document.getElementById('summary-tax').textContent = `$${tax.toFixed(2)}`;
      document.getElementById('summary-total').textContent = `$${total.toFixed(2)}`;

      document.getElementById('cancel-order-btn').addEventListener('click', () => {
        window.location.href = 'cart.html';
      });

      document.getElementById('place-order-btn').addEventListener('click', async () => {
        const form = document.querySelector('.checkout-section');
        const inputs = form.querySelectorAll('[required]');
        let isValid = true;

        inputs.forEach(input => {
          if (!input.value.trim()) {
            isValid = false;
            input.focus();
            alert('Please fill in all required fields.');
          }
        });

        if (!isValid) return;

        const order = {
          id: 'ORD-' + Date.now(),
          customerName: document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          address: document.getElementById('address').value,
          city: document.getElementById('city').value,
          state: document.getElementById('state').value,
          zip: document.getElementById('zip').value,
          country: document.getElementById('country').value,
          items: cartManager.getCartItems(),
          subtotal: subtotal,
          shipping: shipping,
          tax: tax,
          total: total,
          date: new Date().toISOString(),
          status: 'pending',
          payment: 'paypal',
          payment_method: 'paypal',
          payment_status: 'pending'
        };

        try {
          const response = await fetch('/api/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(order)
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText || 'Unable to place the order right now.');
          }
        } catch (error) {
          console.error('Server order save failed', error);
          alert(error.message || 'Unable to place the order right now. Please try again.');
          return;
        }

        const businessEmail = (window.__APP_CONFIG__ && window.__APP_CONFIG__.paypalBusinessEmail) || '';
        const paypalUrl = new URL('https://www.paypal.com/cgi-bin/webscr');
        paypalUrl.searchParams.set('cmd', '_xclick');
        if (businessEmail) paypalUrl.searchParams.set('business', businessEmail);
        paypalUrl.searchParams.set('item_name', `EAU DE PLAY Order ${order.id}`);
        paypalUrl.searchParams.set('amount', total.toFixed(2));
        paypalUrl.searchParams.set('currency_code', 'EUR');
        paypalUrl.searchParams.set('no_shipping', '1');
        paypalUrl.searchParams.set('return', `${window.location.origin || 'https://www.paypal.com'}/checkout-success.html?orderId=${order.id}&paymentStatus=success`);
        paypalUrl.searchParams.set('cancel_return', `${window.location.origin || 'https://www.paypal.com'}/checkout-success.html?orderId=${order.id}&paymentStatus=cancelled`);

        cartManager.clearCart();
        window.location.assign(paypalUrl.toString());
      });
    });
  </script>
</body>
</html>
