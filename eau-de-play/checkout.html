<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - EAU DEY PLAY</title>
  
  <!-- CSS Links -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/public.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>
  <!-- Navbar Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Checkout Page -->
  <section class="cart-page">
    <div class="checkout-container">
      <div class="checkout-header">
        <h1>Checkout</h1>
        <p>Complete your purchase</p>
      </div>

      <div class="checkout-content">
        <!-- Checkout Form -->
        <div class="checkout-section">
          <!-- Shipping Information -->
          <div class="form-section">
            <h3>Shipping Information</h3>
            
            <div class="checkout-form-group">
              <label for="firstName">First Name *</label>
              <input type="text" id="firstName" name="firstName" required>
            </div>

            <div class="checkout-form-group">
              <label for="lastName">Last Name *</label>
              <input type="text" id="lastName" name="lastName" required>
            </div>

            <div class="checkout-form-group">
              <label for="email">Email Address *</label>
              <input type="email" id="email" name="email" required>
            </div>

            <div class="checkout-form-group">
              <label for="phone">Phone Number *</label>
              <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="checkout-form-group">
              <label for="address">Street Address *</label>
              <input type="text" id="address" name="address" required>
            </div>

            <div class="form-row">
              <div class="checkout-form-group">
                <label for="city">City *</label>
                <input type="text" id="city" name="city" required>
              </div>

              <div class="checkout-form-group">
                <label for="state">State/Province *</label>
                <input type="text" id="state" name="state" required>
              </div>
            </div>

            <div class="form-row">
              <div class="checkout-form-group">
                <label for="zip">ZIP/Postal Code *</label>
                <input type="text" id="zip" name="zip" required>
              </div>

              <div class="checkout-form-group">
                <label for="country">Country *</label>
                <input type="text" id="country" name="country" value="United States">
              </div>
            </div>
          </div>

          <!-- Payment Information -->
          <div class="form-section">
            <h4>Payment Method</h4>
            <div class="payment-methods">
              <div class="payment-method">
                <input type="radio" id="payment-card" name="payment" value="card" checked>
                <label for="payment-card">💳 Credit Card</label>
              </div>
              <div class="payment-method">
                <input type="radio" id="payment-paypal" name="payment" value="paypal">
                <label for="payment-paypal">🅿️ PayPal</label>
              </div>
            </div>

            <!-- Credit Card Fields -->
            <div id="card-payment">
              <div class="checkout-form-group">
                <label for="cardName">Cardholder Name *</label>
                <input type="text" id="cardName" name="cardName" required>
              </div>

              <div class="checkout-form-group">
                <label for="cardNumber">Card Number *</label>
                <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" required>
              </div>

              <div class="form-row">
                <div class="checkout-form-group">
                  <label for="cardExpiry">Expiry Date *</label>
                  <input type="text" id="cardExpiry" name="cardExpiry" placeholder="MM/YY" required>
                </div>

                <div class="checkout-form-group">
                  <label for="cardCVV">CVV *</label>
                  <input type="text" id="cardCVV" name="cardCVV" placeholder="123" required>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Order Summary -->
        <div class="checkout-section">
          <h3>Order Summary</h3>
          
          <div id="order-items">
            <!-- Order items dynamically populated -->
          </div>

          <div class="order-totals">
            <div class="total-row">
              <label>Subtotal</label>
              <span id="summary-subtotal">$0.00</span>
            </div>
            <div class="total-row">
              <label>Shipping</label>
              <span id="summary-shipping">$0.00</span>
            </div>
            <div class="total-row">
              <label>Tax (8%)</label>
              <span id="summary-tax">$0.00</span>
            </div>
            <div class="total-row grand-total">
              <label>Total</label>
              <span id="summary-total">$0.00</span>
            </div>
          </div>

          <div class="checkout-actions">
            <button class="btn btn-place-order" id="place-order-btn">PLACE ORDER</button>
            <a href="cart.html" class="btn btn-secondary" style="text-align: center; padding: var(--spacing-lg);">← BACK TO CART</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="js/cart.js"></script>
  <script type="module" src="js/public-app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cartManager = window.cartManager;
      const items = cartManager.getCartItems();

      // Redirect to shop if cart is empty
      if (items.length === 0) {
        alert('Your cart is empty. Please add items before checking out.');
        window.location.href = 'shop.html';
        return;
      }

      // Render order items
      const orderItemsContainer = document.getElementById('order-items');
      const orderItemsHTML = items.map(item => `
        <div class="order-summary-item">
          <div class="item-details">
            <h4>${item.name}</h4>
            <div class="item-quantity">Qty: ${item.quantity}</div>
          </div>
          <div class="item-total">$${(item.price * item.quantity).toFixed(2)}</div>
        </div>
      `).join('');
      orderItemsContainer.innerHTML = orderItemsHTML;

      // Update totals
      const subtotal = cartManager.calculateTotal();
      const shipping = subtotal > 50 ? 0 : 10;
      const tax = subtotal * 0.08;
      const total = subtotal + shipping + tax;

      document.getElementById('summary-subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('summary-shipping').textContent = shipping === 0 ? 'FREE' : `$${shipping.toFixed(2)}`;
      document.getElementById('summary-tax').textContent = `$${tax.toFixed(2)}`;
      document.getElementById('summary-total').textContent = `$${total.toFixed(2)}`;

      // Payment method toggle
      const paymentMethods = document.querySelectorAll('input[name="payment"]');
      const cardPayment = document.getElementById('card-payment');

      paymentMethods.forEach(method => {
        method.addEventListener('change', (e) => {
          if (e.target.value === 'card') {
            cardPayment.style.display = 'block';
            document.getElementById('cardName').required = true;
            document.getElementById('cardNumber').required = true;
            document.getElementById('cardExpiry').required = true;
            document.getElementById('cardCVV').required = true;
          } else {
            cardPayment.style.display = 'none';
            document.getElementById('cardName').required = false;
            document.getElementById('cardNumber').required = false;
            document.getElementById('cardExpiry').required = false;
            document.getElementById('cardCVV').required = false;
          }
        });
      });

      // Place order button
      document.getElementById('place-order-btn').addEventListener('click', () => {
        // Validate form
        const form = document.querySelector('.checkout-section');
        const inputs = form.querySelectorAll('[required]');
        let isValid = true;

        inputs.forEach(input => {
          if (!input.value.trim()) {
            isValid = false;
            input.focus();
            alert('Please fill in all required fields.');
          }
        });

        if (isValid) {
          // Create order
          const order = {
            id: 'ORD-' + Date.now(),
            customerName: document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            city: document.getElementById('city').value,
            state: document.getElementById('state').value,
            zip: document.getElementById('zip').value,
            country: document.getElementById('country').value,
            items: cartManager.getCartItems(),
            subtotal: subtotal,
            shipping: shipping,
            tax: tax,
            total: total,
            date: new Date().toISOString(),
            status: 'Pending',
            payment: document.querySelector('input[name="payment"]:checked').value
          };

          // Save order to localStorage
          const db = JSON.parse(localStorage.getItem('eau-de-play-db') || '{}');
          if (!db.orders) db.orders = [];
          db.orders.push(order);
          localStorage.setItem('eau-de-play-db', JSON.stringify(db));

          // Clear cart
          cartManager.clearCart();

          // Redirect to success page
          window.location.href = 'checkout-success.html?orderId=' + order.id;
        }
      });
    });
  </script>
</body>
</html>
