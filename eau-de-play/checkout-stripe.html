<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - EAU DEY PLAY</title>
  
  <!-- CSS Links -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/public.css">
  <link rel="stylesheet" href="css/cart.css">
  <style>
    /* Stripe Card Element Styling */
    .StripeElement {
      box-sizing: border-box;
      height: 40px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background-color: white;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.12);
      font-size: 16px;
    }

    .StripeElement--focus {
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.2);
      border: 1px solid #aaa;
    }

    .StripeElement--invalid {
      border-color: #fa755a;
    }

    #card-errors {
      color: #fa755a;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .save-card-option {
      margin-top: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .save-card-option input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .payment-status {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }

    .payment-status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .payment-status.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--primary-color);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div id="navbar-placeholder"></div>

  <!-- Checkout Section -->
  <section class="checkout-section">
    <div class="checkout-container">
      <h2>Complete Your Order</h2>

      <div class="checkout-content">
        <!-- Left: Checkout Form -->
        <div class="checkout-form">
          <div id="payment-status" class="payment-status"></div>

          <form id="checkout-form">
            <!-- Shipping Section -->
            <div class="checkout-section-group">
              <h3>Shipping Information</h3>
              
              <div class="form-row">
                <input type="text" id="firstName" placeholder="First Name" required>
                <input type="text" id="lastName" placeholder="Last Name" required>
              </div>

              <input type="email" id="email" placeholder="Email Address" required>
              <input type="tel" id="phone" placeholder="Phone Number" required>

              <input type="text" id="address" placeholder="Street Address" required>

              <div class="form-row">
                <input type="text" id="city" placeholder="City" required>
                <input type="text" id="state" placeholder="State" required>
              </div>

              <div class="form-row">
                <input type="text" id="zip" placeholder="ZIP Code" required>
                <input type="text" id="country" placeholder="Country" value="United States">
              </div>
            </div>

            <!-- Payment Section -->
            <div class="checkout-section-group">
              <h3>Payment Information</h3>
              
              <div class="payment-methods">
                <label>
                  <input type="radio" name="paymentMethod" value="card" checked>
                  Credit/Debit Card
                </label>
                <label>
                  <input type="radio" name="paymentMethod" value="paypal">
                  PayPal
                </label>
              </div>

              <!-- Stripe Card Element -->
              <div id="card-payment-section" class="card-payment-section">
                <p style="margin-bottom: 15px; font-size: 14px; color: #666;">
                  Your payment is securely processed by Stripe.
                </p>
                <div id="card-element" class="StripeElement"></div>
                <div id="card-errors" role="alert"></div>

                <div class="save-card-option">
                  <input type="checkbox" id="saveCard">
                  <label for="saveCard">Save card for future purchases</label>
                </div>
              </div>

              <!-- PayPal Section (Future) -->
              <div id="paypal-section" style="display: none;">
                <p style="color: #666; font-size: 14px;">
                  You will be redirected to PayPal to complete payment.
                </p>
              </div>

              <textarea id="notes" placeholder="Order notes (optional)" style="margin-top: 20px; width: 100%; height: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: Arial;"></textarea>
            </div>

            <button type="submit" id="place-order-btn" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
              <span class="btn-text">Place Order</span>
            </button>
          </form>
        </div>

        <!-- Right: Order Summary -->
        <div class="checkout-summary">
          <h3>Order Summary</h3>
          
          <div id="order-items" class="order-items">
            <!-- Populated by JavaScript -->
          </div>

          <div class="order-totals">
            <div class="total-row">
              <span>Subtotal:</span>
              <span id="checkout-subtotal">$0.00</span>
            </div>
            <div class="total-row">
              <span>Shipping:</span>
              <span id="checkout-shipping">$0.00</span>
            </div>
            <div class="total-row">
              <span>Tax (8%):</span>
              <span id="checkout-tax">$0.00</span>
            </div>
            <div class="total-row total-amount">
              <span>Total:</span>
              <span id="checkout-total">$0.00</span>
            </div>
          </div>

          <p style="font-size: 12px; color: #999; margin-top: 20px; text-align: center;">
            💳 Payments are secure and encrypted
          </p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="https://checkout.flutterwave.com/v3.js"></script>
  <script type="module">
    import { checkout } from './js/checkout-supabase.js';
    import { supabaseAuth } from './js/supabase-auth.js';
    
    let checkoutInstance = null;

    // Initialize on page load
    async function initCheckout() {
      try {
        // Check if user is logged in
        const user = await supabaseAuth.getCurrentUser();
        if (!user) {
          window.location.href = 'admin-login.html?redirect=checkout.html';
          return;
        }

        // Initialize checkout
        checkoutInstance = checkout;
        await checkoutInstance.init();

        // Populate order summary
        populateOrderSummary();

        // Setup form handlers
        setupFormHandlers();

        console.log('✅ Checkout initialized');
      } catch (error) {
        console.error('❌ Checkout initialization error:', error);
        showError('Failed to initialize checkout. Please reload the page.');
      }
    }

    function populateOrderSummary() {
      const cart = window.cartManager.getCartItems();
      const container = document.getElementById('order-items');

      if (cart.length === 0) {
        container.innerHTML = '<p>Your cart is empty</p>';
        document.getElementById('place-order-btn').disabled = true;
        return;
      }

      const html = cart.map(item => `
        <div class="order-item">
          <div style="flex: 1;">
            <div style="font-weight: bold; margin-bottom: 5px;">${item.name}</div>
            <div style="color: #666; font-size: 14px;">Qty: ${item.quantity}</div>
          </div>
          <div style="text-align: right;">
            $${(item.price * item.quantity).toFixed(2)}
          </div>
        </div>
      `).join('');

      container.innerHTML = html;

      // Update totals
      const subtotal = window.cartManager.getSubtotal();
      const tax = window.cartManager.getTax();
      const shipping = window.cartManager.getShipping();
      const total = window.cartManager.getGrandTotal();

      document.getElementById('checkout-subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('checkout-tax').textContent = `$${tax.toFixed(2)}`;
      document.getElementById('checkout-shipping').textContent = 
        shipping === 0 ? 'FREE' : `$${shipping.toFixed(2)}`;
      document.getElementById('checkout-total').textContent = `$${total.toFixed(2)}`;
    }

    function setupFormHandlers() {
      // Payment method toggle
      document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
          const cardSection = document.getElementById('card-payment-section');
          const paypalSection = document.getElementById('paypal-section');

          if (e.target.value === 'card') {
            cardSection.style.display = 'block';
            paypalSection.style.display = 'none';
          } else {
            cardSection.style.display = 'none';
            paypalSection.style.display = 'block';
          }
        });
      });

      // Form submission
      document.getElementById('checkout-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        await handleCheckout();
      });
    }

    async function handleCheckout() {
      const btn = document.getElementById('place-order-btn');
      const statusDiv = document.getElementById('payment-status');
      
      try {
        btn.disabled = true;
        btn.classList.add('loading');
        btn.innerHTML = '<span class="spinner"></span>Processing payment...';

        // Collect form data
        const formData = {
          firstName: document.getElementById('firstName').value,
          lastName: document.getElementById('lastName').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          address: document.getElementById('address').value,
          city: document.getElementById('city').value,
          state: document.getElementById('state').value,
          zip: document.getElementById('zip').value,
          country: document.getElementById('country').value,
          notes: document.getElementById('notes').value,
          saveCard: document.getElementById('saveCard').checked
        };

        // Process payment
        const result = await checkoutInstance.processPayment(formData);

        if (result.success) {
          statusDiv.className = 'payment-status success';
          statusDiv.textContent = '✅ Payment successful! Redirecting...';
          
          // Redirect to success page
          setTimeout(() => {
            window.location.href = `checkout-success.html?orderId=${result.orderId}`;
          }, 2000);
        } else {
          showError(result.error || 'Payment failed. Please try again.');
          btn.disabled = false;
          btn.classList.remove('loading');
          btn.innerHTML = '<span class="btn-text">Place Order</span>';
        }
      } catch (error) {
        console.error('❌ Checkout error:', error);
        showError(error.message || 'An error occurred. Please try again.');
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.innerHTML = '<span class="btn-text">Place Order</span>';
      }
    }

    function showError(message) {
      const statusDiv = document.getElementById('payment-status');
      statusDiv.className = 'payment-status error';
      statusDiv.textContent = '❌ ' + message;
    }

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initCheckout);
    } else {
      initCheckout();
    }
  </script>
  
  <script type="module" src="js/public-app.js"></script>
</body>
</html>
