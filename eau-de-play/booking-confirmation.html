<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Booking Confirmation - EAU DE PLAY</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/public.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main class="container" style="padding:var(--spacing-3xl) 12px;">
    <div id="confirmation-root">
      <h1>Loading confirmation...</h1>
    </div>
  </main>

  <script type="module">
    function qs(name){const p=new URLSearchParams(location.search);return p.get(name)}
    const id = qs('bookingId');
    const root = document.getElementById('confirmation-root');

    function getPaymentState() {
      const value = (qs('paymentStatus') || qs('status') || '').toLowerCase();
      if (['paid', 'success', 'completed', 'confirmed', 'succeeded'].includes(value)) return 'confirmed';
      if (['cancelled', 'canceled', 'cancel', 'failed', 'error'].includes(value)) return 'cancelled';
      return 'pending';
    }

    async function fetchBooking(id){
      try{
        const res = await fetch(`/api/bookings?id=${encodeURIComponent(id)}`);
        if(!res.ok) return null;
        const json = await res.json();
        return json && json.success ? json.booking : null;
      }catch(e){return null}
    }

    async function updateBookingStatus(id, paymentState){
      if (!id || paymentState === 'pending') return null;
      try{
        const res = await fetch('/api/bookings/status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bookingId: id, paymentStatus: paymentState })
        });
        const json = await res.json();
        return json && json.success ? json.booking : null;
      }catch(e){return null}
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleString(undefined, { 
        year: 'numeric', 
        month: 'short', 
        day: 'numeric', 
        hour: '2-digit', 
        minute: '2-digit' 
      });
    }

    (async ()=>{
      const paymentState = getPaymentState();
      let bk = await fetchBooking(id);

      if (id && paymentState !== 'pending') {
        const updated = await updateBookingStatus(id, paymentState);
        if (updated) bk = updated;
      }

      if(!bk){ root.innerHTML = '<h2>Booking not found.</h2>'; return; }

      const heading = paymentState === 'cancelled' ? 'Payment Cancelled' : paymentState === 'confirmed' ? 'Booking Confirmed ✓' : 'Booking Pending';
      const headingColor = paymentState === 'cancelled' ? '#e53935' : '#4caf50';
      const serviceName = bk.serviceName || bk.service_name || 'N/A';
      const location = bk.where || bk.location || 'N/A';
      const startValue = bk.start || bk.start_date || 'N/A';
      const statusText = bk.status || (paymentState === 'confirmed' ? 'Confirmed' : paymentState === 'cancelled' ? 'Cancelled' : 'Pending');

      root.innerHTML = `
        <h1 style="color:${headingColor};">${heading}</h1>
        <div class="booking-summary">
          <p><strong>Booking ID:</strong> ${bk.id}</p>
          <p><strong>Service:</strong> ${serviceName}</p>
          <p><strong>Location:</strong> ${location}</p>
          <p><strong>Date & Time:</strong> ${startValue && startValue !== 'N/A' ? formatDate(startValue) : 'N/A'}</p>
          <p><strong>Total:</strong> €${bk.total ? parseFloat(bk.total).toFixed(2) : '0.00'}</p>
          <p><strong>Payment Method:</strong> ${bk.payment?.system ? bk.payment.system.toUpperCase() : 'PAYPAL'}</p>
          <p><strong>Status:</strong> <span style="color: ${headingColor}; font-weight: 600;">${statusText}</span></p>
        </div>
        <div style="margin-top:16px; display:flex; gap:12px; flex-wrap: wrap;">
          <button class="btn" id="print">Print Receipt</button>
          <button class="btn btn-secondary" id="home">Back to Home</button>
          <p style="width:100%; font-size:0.9rem; color:var(--color-text-secondary); margin-top:12px;">
            <strong>Note:</strong> A confirmation email is sent only after PayPal confirms the payment. Bookings cannot be cancelled directly; to cancel this booking, please <a href="contact.html">contact our admin</a>.
          </p>
        </div>
      `;

      document.getElementById('print').addEventListener('click', ()=>{ window.print(); });
      
      document.getElementById('home').addEventListener('click', ()=>{
        window.location.href = 'index.html';
      });
    })();
  </script>
</body>
</html>
