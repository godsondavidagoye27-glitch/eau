<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Booking Confirmation - EAU DEY PLAY</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/public.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main class="container" style="padding:var(--spacing-3xl) 12px;">
    <div id="confirmation-root">
      <h1>Loading confirmation...</h1>
    </div>
  </main>

  <script type="module">
    function qs(name){const p=new URLSearchParams(location.search);return p.get(name)}
    const id = qs('bookingId');
    const root = document.getElementById('confirmation-root');

    async function fetchBooking(id){
      try{
        const res = await fetch(`/api/bookings?id=${encodeURIComponent(id)}`);
        if(!res.ok) return null;
        const json = await res.json();
        return json && json.success ? json.booking : null;
      }catch(e){return null}
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleString(undefined, { 
        year: 'numeric', 
        month: 'short', 
        day: 'numeric', 
        hour: '2-digit', 
        minute: '2-digit' 
      });
    }

    (async ()=>{
      let bk = await fetchBooking(id);

      if(!bk){ root.innerHTML = '<h2>Booking not found.</h2>'; return; }

      root.innerHTML = `
        <h1>Booking Confirmed ✓</h1>
        <div class="booking-summary">
          <p><strong>Booking ID:</strong> ${bk.id}</p>
          <p><strong>Service:</strong> ${bk.service_name || 'N/A'}</p>
          <p><strong>Location:</strong> ${bk.location || 'N/A'}</p>
          <p><strong>Date & Time:</strong> ${bk.start_date ? formatDate(bk.start_date) : 'N/A'}</p>
          <p><strong>Total:</strong> €${bk.total ? parseFloat(bk.total).toFixed(2) : '0.00'}</p>
          <p><strong>Payment Method:</strong> ${bk.payment_system ? bk.payment_system.toUpperCase() : 'Card'}</p>
          <p><strong>Status:</strong> <span style="color: #4caf50; font-weight: 600;">${bk.status || 'Confirmed'}</span></p>
        </div>
        <div style="margin-top:16px; display:flex; gap:12px; flex-wrap: wrap;">
          <button class="btn" id="print">Print Receipt</button>
          <button class="btn btn-secondary" id="home">Back to Home</button>
          <p style="width:100%; font-size:0.9rem; color:var(--color-text-secondary); margin-top:12px;">
            <strong>Note:</strong> Bookings cannot be cancelled directly. To cancel this booking, please <a href="contact.html">contact our admin</a>.
          </p>
        </div>
      `;

      document.getElementById('print').addEventListener('click', ()=>{ window.print(); });
      
      document.getElementById('home').addEventListener('click', ()=>{
        window.location.href = 'index.html';
      });
    })();
  </script>
</body>
</html>
