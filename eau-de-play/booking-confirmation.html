<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Booking Confirmation - EAU DEY PLAY</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/public.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main class="container" style="padding:var(--spacing-3xl) 12px;">
    <div id="confirmation-root">
      <h1>Loading confirmation...</h1>
    </div>
  </main>

  <script type="module">
    function qs(name){const p=new URLSearchParams(location.search);return p.get(name)}
    const id = qs('bookingId');
    const root = document.getElementById('confirmation-root');

    async function fetchBooking(id){
      try{
        const res = await fetch(`/api/bookings?id=${encodeURIComponent(id)}`);
        if(!res.ok) return null;
        const json = await res.json();
        return json && json.success ? json.booking : null;
      }catch(e){return null}
    }

    (async ()=>{
      let bk = await fetchBooking(id);
      if(!bk){
        // fallback to localStorage
        const bookings = JSON.parse(localStorage.getItem('eau-bookings')||'[]');
        bk = bookings.find(b=>b.id===id) || null;
      }

      if(!bk){ root.innerHTML = '<h2>Booking not found.</h2>'; return; }

      root.innerHTML = `
        <h1>Booking Confirmed</h1>
        <div class="booking-summary">
          <p><strong>Service:</strong> ${bk.serviceName}</p>
          <p><strong>Where:</strong> ${bk.where}</p>
          <p><strong>Start:</strong> ${bk.start}</p>
          <p><strong>Total:</strong> €${bk.total}</p>
          <p><strong>Payment System:</strong> ${bk.payment && bk.payment.system ? bk.payment.system : 'N/A'}</p>
          <p><strong>Card (last4):</strong> ${bk.payment && bk.payment.cardLast4 ? bk.payment.cardLast4 : 'N/A'}</p>
        </div>
        <div style="margin-top:16px; display:flex; gap:12px;">
          <button class="btn" id="print">Print Summary</button>
          <button class="btn btn-secondary" id="cancel">Cancel Booking</button>
        </div>
      `;

      document.getElementById('print').addEventListener('click', ()=>{ window.print(); });

      document.getElementById('cancel').addEventListener('click', async ()=>{
        if(!confirm('Cancel this booking?')) return;
        // Attempt server-side update
        try{
          const res = await fetch('/api/site-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ collection: 'bookings', id: bk.id, updates: { status: 'Canceled' } })
          });
          // ignore response, redirect
        }catch(e){}
        // Also remove local fallback
        try{ const remaining = (JSON.parse(localStorage.getItem('eau-bookings')||'[]')).filter(b=>b.id!==id); localStorage.setItem('eau-bookings', JSON.stringify(remaining)); }catch(e){}
        window.location.href = 'index.html';
      });
    })();
  </script>
</body>
</html>
