<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account - Login / Signup</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/public.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="auth-page">
    <section class="auth-container">
      <div class="auth-card card">
        <div class="auth-top">
          <div>
            <span class="eyebrow">ACCOUNT</span>
            <h1>Log in or create your account</h1>
            <p>Track orders, checkout faster, and manage your deliveries from one dashboard.</p>
          </div>
          <div class="auth-switcher" role="tablist">
            <button type="button" class="auth-switch active" data-target="login-panel">LOG IN</button>
            <button type="button" class="auth-switch" data-target="signup-panel">SIGN UP</button>
          </div>
        </div>

        <div class="auth-forms">
          <section class="auth-panel active" id="login-panel" aria-hidden="false">
            <h2>Welcome back</h2>
            <p>Sign in to view orders, manage shipping, and stay updated.</p>
            <form id="signin-form" class="auth-form">
              <label for="signin-email">Email</label>
              <input type="email" id="signin-email" placeholder="Email" required>

              <label for="signin-password">Password</label>
              <input type="password" id="signin-password" placeholder="Password" required>

              <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
          </section>

          <section class="auth-panel" id="signup-panel" aria-hidden="true">
            <h2>Create an account</h2>
            <p>Join EAU DE PLAY and unlock order tracking, billing, and fast checkout.</p>
            <form id="signup-form" class="auth-form">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" placeholder="Email" required>

              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" placeholder="Password" required>

              <button type="submit" class="btn btn-secondary">Create Account</button>
            </form>
          </section>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/public-app.js"></script>
</body>
</html>
