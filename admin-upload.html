<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Upload - EAU DEY PLAY</title>
</head>
<body>
  <h1>Admin CSV Upload</h1>
  <div>
    <label for="forwarderUrl">Forwarder URL</label>
    <input id="forwarderUrl" type="url" placeholder="https://your.functions.supabase.co/forwarder" style="width:100%" />
  </div>
  <div style="margin-top:12px">
    <input type="file" id="csvFile" accept=".csv,text/csv" />
    <button id="uploadBtn">Upload</button>
  </div>

  <div id="progressWrap" style="margin-top:12px; display:none">
    <div style="margin-bottom:6px"><strong id="fileName"></strong></div>
    <progress id="uploadProgress" value="0" max="100" style="width:100%"></progress>
    <div id="progressText" style="margin-top:6px">0%</div>
  </div>

  <div id="previewWrap" style="margin-top:12px; display:none">
    <div style="font-weight:600; margin-bottom:6px">CSV Preview (first 5 rows):</div>
    <div id="csvPreview" style="overflow:auto; max-height:200px; border:1px solid #eee; padding:8px"></div>
  </div>

  <pre id="status" style="margin-top:12px; white-space:pre-wrap"></pre>

  <script type="module" src="js/admin-upload.js"></script>
</body>
</html>
